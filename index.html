<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-agent — Obsidian Assistent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
  .app { max-width: 480px; width: 100%; }
  h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; text-align: center; }
  .subtitle { font-size: 14px; color: #888; text-align: center; margin-top: 4px; margin-bottom: 2rem; }
  .settings-toggle { font-size: 13px; color: #888; cursor: pointer; text-decoration: underline; text-align: center; margin-bottom: 1.5rem; display: block; }
  .settings-panel { display: none; background: #fff; border: 1px solid #e5e5e0; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
  .settings-panel.open { display: block; }
  .settings-panel h2 { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
  .field input { width: 100%; padding: 9px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; color: #1a1a1a; }
  .field input:focus { outline: none; border-color: #aaa; background: #fff; }
  .save-settings-btn { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; font-size: 14px; cursor: pointer; }
  .mic-area { text-align: center; margin: 1.5rem 0; }
  .mic-btn { width: 88px; height: 88px; border-radius: 50%; border: 1.5px solid #ddd; background: #fff; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .mic-btn.recording { border-color: #e24b4a; background: #fff5f5; animation: pulse 1s infinite; }
  .mic-btn svg { color: #555; }
  .mic-btn.recording svg { color: #e24b4a; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }
  .stop-btn { display: none; margin-top: 12px; padding: 10px 24px; border: 1.5px solid #e24b4a; border-radius: 20px; background: #fff5f5; color: #e24b4a; font-size: 14px; cursor: pointer; }
  .status { font-size: 14px; color: #888; margin-top: 10px; }
  .transcript-box { background: #fff; border: 1px solid #e5e5e0; border-radius: 10px; padding: 14px; margin: 1rem 0; font-size: 15px; color: #1a1a1a; min-height: 64px; line-height: 1.6; display: none; }
  .action-area { display: none; }
  .folder-label { font-size: 13px; color: #888; margin-bottom: 8px; }
  .folder-select { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .folder-btn { padding: 6px 16px; border: 1px solid #ddd; border-radius: 20px; font-size: 13px; cursor: pointer; background: #fff; color: #888; transition: all 0.15s; }
  .folder-btn.active { border-color: #1a1a1a; color: #1a1a1a; font-weight: 500; }
  .action-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .action-btn { flex: 1; min-width: 120px; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; cursor: pointer; background: #fff; color: #1a1a1a; }
  .opslaan-btn { border-color: #1D9E75; color: #0F6E56; }
  .zoek-btn { border-color: #378ADD; color: #185FA5; }
  .vitality-btn { border-color: #9B59B6; color: #6C3483; background: #fdf6ff; font-weight: 500; }
  .vitality-btn:hover { background: #f5e6ff; }
  .response-box { background: #fff; border: 1px solid #e5e5e0; border-radius: 10px; padding: 14px; margin-top: 1rem; font-size: 14px; color: #1a1a1a; line-height: 1.7; display: none; white-space: pre-wrap; }
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; border-radius: 8px; padding: 10px 20px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 99; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">
  <h1>AI-agent</h1>
  <p class="subtitle">Spreek in, sla op of zoek in je vault</p>

  <a class="settings-toggle" onclick="toggleSettings()">⚙ Instellingen</a>

  <div class="settings-panel" id="settings-panel">
    <h2>Instellingen</h2>
    <div class="field">
      <label>Anthropic API key</label>
      <input type="password" id="anthropic-key" placeholder="sk-ant-..." />
    </div>
    <div class="field">
      <label>GitHub token</label>
      <input type="password" id="github-token" placeholder="ghp_..." />
    </div>
    <div class="field">
      <label>GitHub gebruikersnaam</label>
      <input type="text" id="github-user" value="jesuisbicabi" />
    </div>
    <div class="field">
      <label>Repository naam</label>
      <input type="text" id="github-repo" value="obsidian-vault" />
    </div>
    <button class="save-settings-btn" onclick="saveSettings()">Opslaan</button>
  </div>

  <div class="mic-area">
    <button class="mic-btn" id="mic-btn" onclick="startRecording()">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <button class="stop-btn" id="stop-btn" onclick="stopRecording()">Stop opname</button>
    <div class="status" id="status">Tik om in te spreken</div>
  </div>

  <div class="transcript-box" id="transcript"></div>

  <div class="action-area" id="action-area">
    <p class="folder-label">Opslaan in:</p>
    <div class="folder-select" id="folder-select">
      <button class="folder-btn active" data-folder="InMyMind" onclick="selectFolder(this)">InMyMind</button>
      <button class="folder-btn" data-folder="Work" onclick="selectFolder(this)">Work</button>
    </div>
    <div class="action-row">
      <button class="action-btn opslaan-btn" onclick="saveNote()">Opslaan in vault</button>
      <button class="action-btn zoek-btn" onclick="askVault()">Zoek in vault</button>
      <button class="action-btn vitality-btn" onclick="saveVitalityCheckin()">💜 Vitality check-in</button>
    </div>
  </div>

  <div class="response-box" id="response-box"></div>
</div>

<div class="toast" id="toast"></div>

<script>
var recognition = null;
var isRecording = false;
var transcript = '';
var selectedFolder = 'InMyMind';
var settings = {};

// Pad naar het maandbestand in de vault
var VITALITY_BASE = "InMyMind/01 - Dagelijks leven \uD83C\uDFE0 daily notes, weekly reviews, to-do's/vitality monitor";

function getVitalityFilePath() {
  var now = new Date();
  var maanden = ['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];
  var mm = String(now.getMonth() + 1).padStart(2, '0');
  var yyyy = now.getFullYear();
  var maandNaam = maanden[now.getMonth()];
  return VITALITY_BASE + '/' + mm + '-' + yyyy + ' ' + maandNaam + '.md';
}

function getTodayHeading() {
  var now = new Date();
  var dagen = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
  var dd = String(now.getDate()).padStart(2, '0');
  var mm = String(now.getMonth() + 1).padStart(2, '0');
  var yyyy = now.getFullYear();
  var dagNaam = dagen[now.getDay()];
  return '## ' + dd + '-' + mm + '-' + yyyy + ' ' + dagNaam;
}

function getDailyLink() {
  var now = new Date();
  var dd = String(now.getDate()).padStart(2, '0');
  var mm = String(now.getMonth() + 1).padStart(2, '0');
  var yyyy = now.getFullYear();
  return '<span style="font-size:9px">[[' + yyyy + '-' + mm + '-' + dd + ']]</span>';
}

function getTimeStr() {
  var now = new Date();
  return now.toTimeString().slice(0,5);
}

function loadSettings() {
  try {
    var s = localStorage.getItem('vaap_settings');
    if (s) {
      settings = JSON.parse(s);
      if (settings.anthropicKey) document.getElementById('anthropic-key').value = settings.anthropicKey;
      if (settings.githubToken) document.getElementById('github-token').value = settings.githubToken;
      if (settings.githubUser) document.getElementById('github-user').value = settings.githubUser;
      if (settings.githubRepo) document.getElementById('github-repo').value = settings.githubRepo;
    }
  } catch(e) {}
}

function saveSettings() {
  settings = {
    anthropicKey: document.getElementById('anthropic-key').value.trim(),
    githubToken: document.getElementById('github-token').value.trim(),
    githubUser: document.getElementById('github-user').value.trim(),
    githubRepo: document.getElementById('github-repo').value.trim()
  };
  localStorage.setItem('vaap_settings', JSON.stringify(settings));
  showToast('Instellingen opgeslagen!');
  document.getElementById('settings-panel').classList.remove('open');
}

function toggleSettings() {
  document.getElementById('settings-panel').classList.toggle('open');
}

function selectFolder(btn) {
  document.querySelectorAll('.folder-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  selectedFolder = btn.dataset.folder;
}

function highlightFolder(folderName) {
  document.querySelectorAll('.folder-btn').forEach(function(b) {
    b.classList.remove('active');
    if (b.dataset.folder === folderName) b.classList.add('active');
  });
  selectedFolder = folderName;
}

function startRecording() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Spraakherkenning niet beschikbaar'); return; }
  recognition = new SR();
  recognition.lang = 'nl-NL';
  recognition.continuous = true;
  recognition.interimResults = false;
  isRecording = true;
  transcript = '';
  document.getElementById('mic-btn').classList.add('recording');
  document.getElementById('stop-btn').style.display = 'block';
  document.getElementById('status').textContent = 'Aan het luisteren...';
  document.getElementById('transcript').style.display = 'none';
  document.getElementById('transcript').textContent = '';
  document.getElementById('action-area').style.display = 'none';
  document.getElementById('response-box').style.display = 'none';

  recognition.onresult = function(e) {
    for (var i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        transcript += e.results[i][0].transcript + ' ';
      }
    }
    var t = document.getElementById('transcript');
    t.style.display = 'block';
    t.textContent = transcript.trim();
  };

  recognition.onerror = function(e) {
    if (e.error !== 'aborted' && e.error !== 'no-speech') showToast('Fout: ' + e.error);
  };

  recognition.onend = function() {
    if (isRecording) {
      try { recognition.start(); } catch(e) {}
    }
  };

  try { recognition.start(); } catch(e) { showToast('Kan microfoon niet starten: ' + e.message); }
}

function stopRecording() {
  isRecording = false;
  if (recognition) {
    recognition.onend = null;
    recognition.onerror = null;
    try { recognition.stop(); } catch(e) {}
  }
  document.getElementById('mic-btn').classList.remove('recording');
  document.getElementById('stop-btn').style.display = 'none';
  document.getElementById('status').textContent = 'Tik om in te spreken';
  var finalText = transcript.trim();
  if (!finalText) {
    var domText = document.getElementById('transcript').textContent.trim();
    if (domText) finalText = domText;
  }
  transcript = finalText;
  if (transcript) {
    document.getElementById('transcript').style.display = 'block';
    document.getElementById('transcript').textContent = transcript;
    document.getElementById('action-area').style.display = 'block';
  } else {
    showToast('Geen tekst ontvangen, probeer opnieuw');
  }
}

// ─── VITALITY CHECK-IN ──────────────────────────────────────────────────────

async function saveVitalityCheckin() {
  if (!transcript.trim()) return;
  if (!settings.anthropicKey || !settings.githubToken) { showToast('Vul eerst instellingen in'); toggleSettings(); return; }

  showToast('Check-in verwerken...');
  var box = document.getElementById('response-box');
  box.style.display = 'block';
  box.textContent = 'Even geduld...';

  try {
    var timeStr = getTimeStr();
    var filePath = getVitalityFilePath();
    var todayHeading = getTodayHeading();
    var dailyLink = getDailyLink();

    var user = settings.githubUser;
    var repo = settings.githubRepo;
    var token = settings.githubToken;
    var encodedPath = filePath.split('/').map(encodeURIComponent).join('/');
    var url = 'https://api.github.com/repos/' + user + '/' + repo + '/contents/' + encodedPath;

    // Stap 1: laat Claude de check-in formatteren
    var prompt = 'Verwerk deze gesproken check-in naar één of meerdere korte markdown-regels voor een vitality logboek.\n\nFormaat: - HH:MM [emoji] [korte beschrijving]\n\nGebruik de onderstaande emoji automatisch als het bijbehorende trefwoord voorkomt in de gesproken tekst:\n💨 migraine weg / pillen gewerkt\n🌄 opgestaan / uit bed\n🛏️ naar bed / slapen gaan\n☕ espresso / koffie\n🧠 kramp in hoofd / hersens\n💅 nagelbijten / vingers kapotmaken\n😶 gemoedstoestand / hoe ik me voel / cijfer stemming (voeg score toe als genoemd, bijv. 😶 3/5)\n⚡ fysieke toestand / energie / cijfer energie (voeg score toe als genoemd)\n💤 wakker liggen / niet kunnen slapen\n🍴 gegeten\n🍽️ samen met Joa gegeten\n🥣 yoghurt\n🥓 chips / hartige snack\n👩‍🍳 koken / bakken\n🫃 honger / hongergevoel\n🤢 misselijk\n💻 thuis werken / laptop / pc\n🧹 schoonmaken / opruimen\n🦶 Feet-Up\n📳 telefoon in bed\n😵‍💫 duizelig\n🛋️ op de bank\n🧘 yoga\n👩‍🍼 Joa\n👵 mama / moeder / oma\n🚶‍♀️ wandelen\n🏠 naar huis / ben thuis / wil naar huis\n🚲 fietsen\n🗯️ berichtje ontvangen / WhatsApp\n🙏 dankbaar\n📸 fotograferen / studio\n🦵 fysio\n\nAls geen enkel trefwoord matcht, gebruik dan:\n💊 voor medicijnen of supplementen\n🤕 voor lichamelijke klachten\n📝 voor activiteit of bezigheid\n\nMeerdere onderwerpen = meerdere regels.\nHoud het beknopt maar informatief. Geen uitleg, alleen de regel(s).\n\nTijd: ' + timeStr + '\nGesproken tekst: "' + transcript + '"\n\nGeef ALLEEN de markdown-regel(s) terug, niets anders.';

    var resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': settings.anthropicKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 300, messages: [{ role: 'user', content: prompt }] })
    });

    var apiData = await resp.json();
    if (!apiData.content || !apiData.content[0]) throw new Error('API fout: ' + JSON.stringify(apiData));
    var newLines = apiData.content[0].text.trim();

    // Stap 2: haal nu VERS het bestand op (zodat handmatige wijzigingen niet worden overschreven)
    var fileContent = '';
    var sha = null;
    var check = await fetch(url, { headers: { Authorization: 'token ' + token } });
    if (check.ok) {
      var fileData = await check.json();
      sha = fileData.sha;
      fileContent = decodeURIComponent(escape(atob(fileData.content.replace(/\n/g, ''))));
    } else if (check.status === 404) {
      showToast('Maandbestand niet gevonden');
      box.textContent = 'Fout: bestand niet gevonden:\n' + filePath;
      return;
    } else {
      throw new Error('GitHub fout: ' + check.status);
    }

    // Stap 3: voeg check-in in op de juiste plek in het bestand
    var updatedContent = insertCheckin(fileContent, todayHeading, dailyLink, newLines);

    // Stap 4: schrijf terug naar GitHub
    var encoded = btoa(unescape(encodeURIComponent(updatedContent)));
    var body = { message: 'Vitality check-in: ' + timeStr, content: encoded, sha: sha };
    var r = await fetch(url, {
      method: 'PUT',
      headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!r.ok) { var err = await r.json(); throw new Error(err.message || 'GitHub schrijffout'); }

    showToast('Check-in opgeslagen! 💜');
    box.textContent = 'Toegevoegd aan ' + todayHeading + ':\n\n' + newLines;
    transcript = '';
    document.getElementById('transcript').style.display = 'none';
    document.getElementById('action-area').style.display = 'none';

  } catch(e) {
    showToast('Fout: ' + e.message);
    box.textContent = 'Fout: ' + e.message;
  }
}

function insertCheckin(fileContent, todayHeading, dailyLink, newLines) {
  var checkinHeader = '**📋 Check-ins**';

  // Zoek de dag-sectie van vandaag
  var dayIndex = fileContent.indexOf(todayHeading);

  if (dayIndex === -1) {
    // Dag bestaat nog niet — voeg BOVENAAN toe (na eventuele frontmatter of eerste regel)
    var headingWithLink = todayHeading + ' ' + dailyLink;
    var dayBlock = headingWithLink + '\n\n' + checkinHeader + '\n' + newLines + '\n\n';

    // Zoek de eerste ## heading om vóór in te voegen
    var firstHeading = fileContent.search(/^## /m);
    if (firstHeading === -1) {
      // Geen headings — plak bovenaan
      return dayBlock + fileContent.trimStart();
    } else {
      return fileContent.slice(0, firstHeading) + dayBlock + fileContent.slice(firstHeading);
    }
  }

  // Dag bestaat al — check of de dailyLink al aanwezig is, zo niet voeg toe
  var dayLineEnd = fileContent.indexOf('\n', dayIndex);
  var dayLine = fileContent.slice(dayIndex, dayLineEnd);
  if (dayLine.indexOf('[[') === -1) {
    // Link nog niet aanwezig — voeg toe aan de heading regel
    fileContent = fileContent.slice(0, dayLineEnd) + ' ' + dailyLink + fileContent.slice(dayLineEnd);
    // Herbereken dayIndex (niet veranderd) en dayLineEnd
    dayLineEnd = fileContent.indexOf('\n', dayIndex);
  }

  // Zoek het einde van de dag-sectie (volgende ## heading of einde bestand)
  var afterDay = fileContent.indexOf('\n## ', dayIndex + todayHeading.length);
  var daySection = afterDay === -1 ? fileContent.slice(dayIndex) : fileContent.slice(dayIndex, afterDay);

  var checkinIndex = daySection.indexOf(checkinHeader);

  if (checkinIndex !== -1) {
    // Check-ins blok bestaat al — voeg regel(s) toe na het blok
    var afterCheckin = daySection.indexOf('\n###', checkinIndex);
    var afterCheckin2 = daySection.indexOf('\n---', checkinIndex);
    var insertAt;
    if (afterCheckin !== -1 && (afterCheckin2 === -1 || afterCheckin < afterCheckin2)) {
      insertAt = checkinIndex + afterCheckin;
    } else if (afterCheckin2 !== -1) {
      insertAt = checkinIndex + afterCheckin2;
    } else {
      insertAt = daySection.length;
    }

    var updatedDaySection = daySection.slice(0, insertAt) + '\n' + newLines + daySection.slice(insertAt);
    if (afterDay === -1) {
      return fileContent.slice(0, dayIndex) + updatedDaySection;
    } else {
      return fileContent.slice(0, dayIndex) + updatedDaySection + fileContent.slice(afterDay);
    }

  } else {
    // Geen check-ins blok — voeg het toe aan het einde van de dag-sectie, voor de --- of volgende ##
    var insertPos = daySection.search(/\n---\s*\n(?![\s\S]*\n---)/);
    if (insertPos === -1) insertPos = daySection.length;

    var checkinBlock = '\n\n' + checkinHeader + '\n' + newLines;
    var updatedDaySection2 = daySection.slice(0, insertPos) + checkinBlock + daySection.slice(insertPos);

    if (afterDay === -1) {
      return fileContent.slice(0, dayIndex) + updatedDaySection2;
    } else {
      return fileContent.slice(0, dayIndex) + updatedDaySection2 + fileContent.slice(afterDay);
    }
  }
}

// ─── BESTAANDE FUNCTIES ──────────────────────────────────────────────────────

async function saveNote() {
  if (!transcript.trim()) return;
  if (!settings.anthropicKey || !settings.githubToken) { showToast('Vul eerst instellingen in'); toggleSettings(); return; }
  showToast('Even geduld...');
  try {
    var now = new Date();
    var dateStr = now.toISOString().slice(0,10);
    var dd = dateStr.slice(8,10);
    var mm = dateStr.slice(5,7);
    var yyyy = dateStr.slice(0,4);
    var dateDisplay = dd + '-' + mm + '-' + yyyy;
    var timeStr = now.toTimeString().slice(0,5);
    var dagen = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
    var dagNaam = dagen[now.getDay()];
    var maanden = ['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];
    var maandNaam = maanden[now.getMonth()];
    var vitalityLink = '<span style="font-size:9px">[[' + mm + '-' + yyyy + ' ' + maandNaam + ']]</span>';

    var NOTE_BASE = "InMyMind/01 - Dagelijks leven \uD83C\uDFE0 daily notes, weekly reviews, to-do's/01 daily";
    var filename = NOTE_BASE + '/' + dateStr + '.md';

    var prompt = 'Analyseer deze gesproken tekst en geef een JSON response met precies deze structuur (geen uitleg, alleen JSON):\n{"notitie": "# Titel\\n\\nInhoud"}\n\nMaak de notitie rijk opgemaakt in Obsidian markdown. Regels:\n- De titel bevat GEEN datum\n- Zet direct onder de titel: \uD83D\uDCC5 Datum: ' + dateDisplay + ' | \uD83D\uDD50 Tijd: ' + timeStr + ' | ' + dagNaam + '\n- Gebruik ALTIJD emoji-icoontjes bij sectiekoppen, bijv. \uD83D\uDCCC ## Actie, \uD83D\uDCDD ## Notitie aan mezelf, \uD83D\uDCA1 ## Idee, \u2705 ## Taken, \u26A0\uFE0F ## Probleem, \uD83D\uDD04 ## Status, \uD83D\uDCCB ## Voorbereiding\n- Gebruik checkboxes (- [ ]) voor actiepunten\n- Gebruik **bold** voor belangrijke woorden\n\nGesproken tekst: "' + transcript + '"\n\nGeef ALLEEN de JSON terug, geen markdown backticks, geen uitleg.';

    var resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': settings.anthropicKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
    });
    var data = await resp.json();
    if (!data.content || !data.content[0]) throw new Error('API fout: ' + JSON.stringify(data));

    var responseText = data.content[0].text.trim();
    var parsed;
    try { parsed = JSON.parse(responseText); } catch(e) { parsed = { notitie: responseText }; }
    var noteContent = parsed.notitie || responseText;

    var user = settings.githubUser;
    var repo = settings.githubRepo;
    var token = settings.githubToken;
    var encodedPath = filename.split('/').map(encodeURIComponent).join('/');
    var url = 'https://api.github.com/repos/' + user + '/' + repo + '/contents/' + encodedPath;

    var existingContent = null;
    var sha = null;
    var check = await fetch(url, { headers: { Authorization: 'token ' + token } });
    if (check.ok) {
      var fileData = await check.json();
      sha = fileData.sha;
      existingContent = decodeURIComponent(escape(atob(fileData.content.replace(/\n/g, ''))));
    }

    var finalContent;
    if (existingContent === null) {
      finalContent = vitalityLink + '\n\n' + noteContent;
    } else {
      var bodyContent = noteContent.replace(/^#\s+[^\n]+\n/, '').trimStart();
      finalContent = existingContent.trimEnd() + '\n\n---\n\n\uD83D\uDD50 ' + timeStr + '\n\n' + bodyContent;
    }

    var encoded = btoa(unescape(encodeURIComponent(finalContent)));
    var body = { message: 'AI-agent: ' + dateStr, content: encoded };
    if (sha) body.sha = sha;
    var r = await fetch(url, { method: 'PUT', headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!r.ok) { var err = await r.json(); throw new Error(err.message || 'GitHub fout'); }

    showToast('Opgeslagen in dagnotitie!');
    var box = document.getElementById('response-box');
    box.style.display = 'block';
    box.textContent = 'Opgeslagen als:\n' + filename;
    transcript = '';
    document.getElementById('transcript').style.display = 'none';
    document.getElementById('action-area').style.display = 'none';
  } catch(e) { showToast('Fout: ' + e.message); }
}

async function saveToGitHub(path, content) {
  var user = settings.githubUser;
  var repo = settings.githubRepo;
  var token = settings.githubToken;
  var encodedPath = path.split('/').map(encodeURIComponent).join('/');
  var url = 'https://api.github.com/repos/' + user + '/' + repo + '/contents/' + encodedPath;
  var encoded = btoa(unescape(encodeURIComponent(content)));
  var sha = null;
  try {
    var check = await fetch(url, { headers: { Authorization: 'token ' + token }});
    if (check.ok) { var d = await check.json(); sha = d.sha; }
  } catch(e) {}
  var body = { message: 'AI-agent: ' + path, content: encoded };
  if (sha) body.sha = sha;
  var r = await fetch(url, { method: 'PUT', headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!r.ok) { var err = await r.json(); throw new Error(err.message || 'GitHub fout'); }
}

async function askVault() {
  if (!transcript.trim()) return;
  if (!settings.anthropicKey || !settings.githubToken) { showToast('Vul eerst instellingen in'); toggleSettings(); return; }
  showToast('Zoeken in vault...');
  var box = document.getElementById('response-box');
  box.style.display = 'block';
  box.textContent = 'Even zoeken...';
  try {
    var user = settings.githubUser;
    var repo = settings.githubRepo;
    var token = settings.githubToken;
    var r = await fetch('https://api.github.com/repos/' + user + '/' + repo + '/git/trees/main?recursive=1', { headers: { Authorization: 'token ' + token }});
    var data = await r.json();
    var files = data.tree ? data.tree.filter(function(f){ return f.path.endsWith('.md'); }).map(function(f){ return f.path; }).join('\n') : 'Geen bestanden';
    var prompt = 'Dit zijn de bestanden in mijn Obsidian vault:\n' + files + '\n\nMijn vraag: "' + transcript + '"\n\nGeef een kort en duidelijk antwoord in het Nederlands. Als je een bestandspad weet, noem het dan.';
    var resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': settings.anthropicKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
    });
    var d = await resp.json();
    if (!d.content || !d.content[0]) throw new Error('API fout: ' + JSON.stringify(d));
    box.textContent = d.content[0].text;
  } catch(e) { box.textContent = 'Fout: ' + e.message; }
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

loadSettings();
</script>
