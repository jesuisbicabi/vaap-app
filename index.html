<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-agent — Obsidian Assistent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
  .app { max-width: 480px; width: 100%; }
  h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; text-align: center; }
  .subtitle { font-size: 14px; color: #888; text-align: center; margin-top: 4px; margin-bottom: 2rem; }
  .settings-toggle { font-size: 13px; color: #888; cursor: pointer; text-decoration: underline; text-align: center; margin-bottom: 1.5rem; display: block; }
  .settings-panel { display: none; background: #fff; border: 1px solid #e5e5e0; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
  .settings-panel.open { display: block; }
  .settings-panel h2 { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
  .field input { width: 100%; padding: 9px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; color: #1a1a1a; }
  .field input:focus { outline: none; border-color: #aaa; background: #fff; }
  .save-settings-btn { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; font-size: 14px; cursor: pointer; }
  .mic-area { text-align: center; margin: 1.5rem 0; }
  .mic-btn { width: 88px; height: 88px; border-radius: 50%; border: 1.5px solid #ddd; background: #fff; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .mic-btn.recording { border-color: #e24b4a; background: #fff5f5; animation: pulse 1s infinite; }
  .mic-btn svg { color: #555; }
  .mic-btn.recording svg { color: #e24b4a; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }
  .stop-btn { display: none; margin-top: 12px; padding: 10px 24px; border: 1.5px solid #e24b4a; border-radius: 20px; background: #fff5f5; color: #e24b4a; font-size: 14px; cursor: pointer; }
  .status { font-size: 14px; color: #888; margin-top: 10px; }
  .transcript-box { background: #fff; border: 1px solid #e5e5e0; border-radius: 10px; padding: 14px; margin: 1rem 0; font-size: 15px; color: #1a1a1a; min-height: 64px; line-height: 1.6; display: none; }
  .action-area { display: none; }
  .folder-label { font-size: 13px; color: #888; margin-bottom: 8px; }
  .folder-select { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .folder-btn { padding: 6px 16px; border: 1px solid #ddd; border-radius: 20px; font-size: 13px; cursor: pointer; background: #fff; color: #888; transition: all 0.15s; }
  .folder-btn.active { border-color: #1a1a1a; color: #1a1a1a; font-weight: 500; }
  .action-row { display: flex; gap: 8px; }
  .action-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; cursor: pointer; background: #fff; color: #1a1a1a; }
  .opslaan-btn { border-color: #1D9E75; color: #0F6E56; }
  .zoek-btn { border-color: #378ADD; color: #185FA5; }
  .response-box { background: #fff; border: 1px solid #e5e5e0; border-radius: 10px; padding: 14px; margin-top: 1rem; font-size: 14px; color: #1a1a1a; line-height: 1.7; display: none; white-space: pre-wrap; }
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; border-radius: 8px; padding: 10px 20px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 99; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">
  <h1>AI-agent</h1>
  <p class="subtitle">Spreek in, sla op of zoek in je vault</p>

  <a class="settings-toggle" onclick="toggleSettings()">⚙ Instellingen</a>

  <div class="settings-panel" id="settings-panel">
    <h2>Instellingen</h2>
    <div class="field">
      <label>Anthropic API key</label>
      <input type="password" id="anthropic-key" placeholder="sk-ant-..." />
    </div>
    <div class="field">
      <label>GitHub token</label>
      <input type="password" id="github-token" placeholder="ghp_..." />
    </div>
    <div class="field">
      <label>GitHub gebruikersnaam</label>
      <input type="text" id="github-user" value="jesuisbicabi" />
    </div>
    <div class="field">
      <label>Repository naam</label>
      <input type="text" id="github-repo" value="obsidian-vault" />
    </div>
    <button class="save-settings-btn" onclick="saveSettings()">Opslaan</button>
  </div>

  <div class="mic-area">
    <button class="mic-btn" id="mic-btn" onclick="startRecording()">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <button class="stop-btn" id="stop-btn" onclick="stopRecording()">Stop opname</button>
    <div class="status" id="status">Tik om in te spreken</div>
  </div>

  <div class="transcript-box" id="transcript"></div>

  <div class="action-area" id="action-area">
    <p class="folder-label">Opslaan in:</p>
    <div class="folder-select" id="folder-select">
      <button class="folder-btn active" data-folder="Inbox" onclick="selectFolder(this)">Inbox</button>
      <button class="folder-btn" data-folder="InMyMind" onclick="selectFolder(this)">InMyMind</button>
      <button class="folder-btn" data-folder="Work" onclick="selectFolder(this)">Work</button>
      <button class="folder-btn" data-folder="2026" onclick="selectFolder(this)">2026</button>
    </div>
    <div class="action-row">
      <button class="action-btn opslaan-btn" onclick="saveNote()">Opslaan in vault</button>
      <button class="action-btn zoek-btn" onclick="askVault()">Zoek in vault</button>
    </div>
  </div>

  <div class="response-box" id="response-box"></div>
</div>

<div class="toast" id="toast"></div>

<script>
var recognition = null;
var isRecording = false;
var transcript = '';
var selectedFolder = 'Inbox';
var settings = {};

function loadSettings() {
  try {
    var s = localStorage.getItem('vaap_settings');
    if (s) {
      settings = JSON.parse(s);
      if (settings.anthropicKey) document.getElementById('anthropic-key').value = settings.anthropicKey;
      if (settings.githubToken) document.getElementById('github-token').value = settings.githubToken;
      if (settings.githubUser) document.getElementById('github-user').value = settings.githubUser;
      if (settings.githubRepo) document.getElementById('github-repo').value = settings.githubRepo;
    }
  } catch(e) {}
}

function saveSettings() {
  settings = {
    anthropicKey: document.getElementById('anthropic-key').value.trim(),
    githubToken: document.getElementById('github-token').value.trim(),
    githubUser: document.getElementById('github-user').value.trim(),
    githubRepo: document.getElementById('github-repo').value.trim()
  };
  localStorage.setItem('vaap_settings', JSON.stringify(settings));
  showToast('Instellingen opgeslagen!');
  document.getElementById('settings-panel').classList.remove('open');
}

function toggleSettings() {
  document.getElementById('settings-panel').classList.toggle('open');
}

function selectFolder(btn) {
  document.querySelectorAll('.folder-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  selectedFolder = btn.dataset.folder;
}

function highlightFolder(folderName) {
  document.querySelectorAll('.folder-btn').forEach(function(b) {
    b.classList.remove('active');
    if (b.dataset.folder === folderName) b.classList.add('active');
  });
  selectedFolder = folderName;
}

function startRecording() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Spraakherkenning niet beschikbaar'); return; }
  recognition = new SR();
  recognition.lang = 'nl-NL';
  recognition.continuous = true;
  recognition.interimResults = false;
  isRecording = true;
  transcript = '';
  document.getElementById('mic-btn').classList.add('recording');
  document.getElementById('stop-btn').style.display = 'block';
  document.getElementById('status').textContent = 'Aan het luisteren...';
  document.getElementById('transcript').style.display = 'none';
  document.getElementById('transcript').textContent = '';
  document.getElementById('action-area').style.display = 'none';
  document.getElementById('response-box').style.display = 'none';

  recognition.onresult = function(e) {
    for (var i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        transcript += e.results[i][0].transcript + ' ';
      }
    }
    var t = document.getElementById('transcript');
    t.style.display = 'block';
    t.textContent = transcript.trim();
  };

  recognition.onerror = function(e) {
    if (e.error !== 'aborted' && e.error !== 'no-speech') showToast('Fout: ' + e.error);
  };

  recognition.onend = function() {
    if (isRecording) {
      try { recognition.start(); } catch(e) {}
    }
  };

  try { recognition.start(); } catch(e) { showToast('Kan microfoon niet starten: ' + e.message); }
}

function stopRecording() {
  isRecording = false;
  if (recognition) {
    recognition.onend = null;
    recognition.onerror = null;
    try { recognition.stop(); } catch(e) {}
  }
  document.getElementById('mic-btn').classList.remove('recording');
  document.getElementById('stop-btn').style.display = 'none';
  document.getElementById('status').textContent = 'Tik om in te spreken';
  var finalText = transcript.trim();
  if (!finalText) {
    var domText = document.getElementById('transcript').textContent.trim();
    if (domText) finalText = domText;
  }
  transcript = finalText;
  if (transcript) {
    document.getElementById('transcript').style.display = 'block';
    document.getElementById('transcript').textContent = transcript;
    document.getElementById('action-area').style.display = 'block';
  } else {
    showToast('Geen tekst ontvangen, probeer opnieuw');
  }
}

async function saveNote() {
  if (!transcript.trim()) return;
  if (!settings.anthropicKey || !settings.githubToken) { showToast('Vul eerst instellingen in'); toggleSettings(); return; }
  showToast('Even geduld...');
  try {
    var now = new Date();
    var dateStr = now.toISOString().slice(0,10);
    var timeStr = now.toTimeString().slice(0,5);
    var prompt = 'Analyseer deze gesproken tekst en geef een JSON response met precies deze structuur (geen uitleg, alleen JSON):\n{"map": "Inbox", "notitie": "# Titel\\n\\nInhoud"}\n\nKies de map op basis van de inhoud:\n- "Work": werkgerelateerd, taken voor werk, collegas, werkprocedures\n- "InMyMind": persoonlijke gedachten, ideeen, herinneringen, gevoelens\n- "Inbox": onduidelijk of gemengd\n- "2026": jaar-specifieke plannen of doelen\n\nDatum: ' + dateStr + ', Tijd: ' + timeStr + '\nGesproken tekst: "' + transcript + '"\n\nGeef ALLEEN de JSON terug, geen markdown backticks, geen uitleg.';

    var resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': settings.anthropicKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
    });
    var data = await resp.json();
    if (!data.content || !data.content[0]) throw new Error('API fout: ' + JSON.stringify(data));

    var responseText = data.content[0].text.trim();
    var parsed;
    try { parsed = JSON.parse(responseText); } catch(e) { parsed = { map: selectedFolder, notitie: responseText }; }
    var autoMap = ['Work','InMyMind','Inbox','2026'].includes(parsed.map) ? parsed.map : selectedFolder;
    highlightFolder(autoMap);
    var noteContent = parsed.notitie || responseText;
    var titleMatch = noteContent.match(/^#\s+(.+)/m);
    var title = titleMatch ? titleMatch[1].trim().replace(/[\/\\?%*:|"<>]/g, '-') : 'notitie-' + dateStr;
    var filename = autoMap + '/' + dateStr + '-' + title + '.md';
    await saveToGitHub(filename, noteContent);
    showToast('Opgeslagen in ' + autoMap + '!');
    var box = document.getElementById('response-box');
    box.style.display = 'block';
    box.textContent = 'Opgeslagen als:\n' + filename;
    transcript = '';
    document.getElementById('transcript').style.display = 'none';
    document.getElementById('action-area').style.display = 'none';
  } catch(e) { showToast('Fout: ' + e.message); }
}

async function saveToGitHub(path, content) {
  var user = settings.githubUser;
  var repo = settings.githubRepo;
  var token = settings.githubToken;
  var url = 'https://api.github.com/repos/' + user + '/' + repo + '/contents/' + path;
  var encoded = btoa(unescape(encodeURIComponent(content)));
  var sha = null;
  try {
    var check = await fetch(url, { headers: { Authorization: 'token ' + token }});
    if (check.ok) { var d = await check.json(); sha = d.sha; }
  } catch(e) {}
  var body = { message: 'AI-agent: ' + path, content: encoded };
  if (sha) body.sha = sha;
  var r = await fetch(url, { method: 'PUT', headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!r.ok) { var err = await r.json(); throw new Error(err.message || 'GitHub fout'); }
}

async function askVault() {
  if (!transcript.trim()) return;
  if (!settings.anthropicKey || !settings.githubToken) { showToast('Vul eerst instellingen in'); toggleSettings(); return; }
  showToast('Zoeken in vault...');
  var box = document.getElementById('response-box');
  box.style.display = 'block';
  box.textContent = 'Even zoeken...';
  try {
    var user = settings.githubUser;
    var repo = settings.githubRepo;
    var token = settings.githubToken;
    var r = await fetch('https://api.github.com/repos/' + user + '/' + repo + '/git/trees/main?recursive=1', { headers: { Authorization: 'token ' + token }});
    var data = await r.json();
    var files = data.tree ? data.tree.filter(function(f){ return f.path.endsWith('.md'); }).map(function(f){ return f.path; }).join('\n') : 'Geen bestanden';
    var prompt = 'Dit zijn de bestanden in mijn Obsidian vault:\n' + files + '\n\nMijn vraag: "' + transcript + '"\n\nGeef een kort en duidelijk antwoord in het Nederlands. Als je een bestandspad weet, noem het dan.';
    var resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': settings.anthropicKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
    });
    var d = await resp.json();
    if (!d.content || !d.content[0]) throw new Error('API fout: ' + JSON.stringify(d));
    box.textContent = d.content[0].text;
  } catch(e) { box.textContent = 'Fout: ' + e.message; }
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

loadSettings();
</script>
</body>
</html>
